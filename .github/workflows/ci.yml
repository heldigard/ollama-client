name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Classifiers advertise 3.11-3.14; exercise the whole supported range so
        # a stdlib-only regression on a newer interpreter is caught here, not in
        # a consumer's hook.
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install locked test environment
        run: uv sync --extra test --locked

      - name: Test
        run: uv run --frozen pytest

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Type-check
        run: uv run --frozen pyright

      # Packaging is interpreter-independent; build + smoke once (on the floor
      # interpreter) instead of four redundant wheel builds.
      - name: Build wheel and source distribution
        if: matrix.python-version == '3.11'
        run: uv build

      - name: Smoke installed wheel
        if: matrix.python-version == '3.11'
        run: |
          uv venv .venv-wheel --python 3.11
          uv pip install --python .venv-wheel/bin/python dist/*.whl
          .venv-wheel/bin/python -c "import ollama_client; print(ollama_client.__version__)"
          .venv-wheel/bin/python -m ollama_client --version
          .venv-wheel/bin/ollama-client --version
